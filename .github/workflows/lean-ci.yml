name: lean-ci

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
      - name: Build Main Library
        run: lake build SGSupermanifolds
      - name: Build Global Stokes Module
        run: lake build StringGeometry.Supermanifolds.Integration.GlobalStokes
